<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Orchestrator Hold Admin</title>
  <style>
    body { font-family: sans-serif; margin: 20px; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #ddd; padding: 8px; }
    th { background: #f2f2f2; }
    pre { background: #111; color: #0f0; padding: 10px; }
    button { padding: 6px 10px; }
  </style>
</head>
<body>
  <h1>Orchestrator Hold Queue</h1>
  <button id="refresh">Refresh</button>
  <table id="holds"><thead><tr><th>ID</th><th>CreatedAt</th><th>Errors</th><th>IntentAction</th><th>ResponseAction</th><th>Ops</th></tr></thead><tbody></tbody></table>
  <h2>Preview</h2>
  <pre id="preview">Select a hold to view</pre>
  <h2>Inference Telemetry (dev)</h2>
  <div>
    <label>Show last <input id="teleLimit" type="number" value="100" style="width:80px"/> entries</label>
    <button id="loadTelemetry">Load Telemetry</button>
  </div>
  <div style="margin-top:8px">
    <label>Rotate/Trim: keep last <input id="rotateMax" type="number" value="2000" style="width:100px"/> lines</label>
    <label style="margin-left:8px"><input id="rotateDo" type="checkbox"/> Rotate to archive</label>
    <button id="doRotate">Run Rotate/Trim</button>
  </div>
  <pre id="telemetry">No telemetry loaded</pre>
  <script>
    async function loadTelemetry() {
      const limit = Number(document.getElementById('teleLimit').value) || 100;
      try {
        const r = await fetch('/api/telemetry/inference/' + encodeURIComponent(String(limit)));
        const json = await r.json();
        document.getElementById('telemetry').textContent = JSON.stringify(json, null, 2);
      } catch (err) {
        document.getElementById('telemetry').textContent = 'Failed to load telemetry: ' + String(err);
      }
    }
    document.getElementById('loadTelemetry').addEventListener('click', loadTelemetry);
    document.getElementById('doRotate').addEventListener('click', async () => {
      const max = Number(document.getElementById('rotateMax').value) || 2000;
      const rotate = document.getElementById('rotateDo').checked;
      try {
        const r = await fetch('/api/telemetry/rotate', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ maxLines: max, rotate }) });
        const j = await r.json();
        alert('Telemetry rotate result: ' + JSON.stringify(j));
        // refresh telemetry view
        loadTelemetry();
      } catch (err) {
        alert('Rotate failed: ' + String(err));
      }
    });
    async function fetchHolds() {
      const r = await fetch('/api/holds');
      const items = await r.json();
      const tbody = document.querySelector('#holds tbody');
      tbody.innerHTML = '';
      items.forEach(it => {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${it.id}</td><td>${it.createdAt}</td><td>${it.errorsCount}</td><td>${it.intentAction || ''}</td><td>${it.responseAction || ''}</td><td><button data-id="${it.id}" class="view">View</button> <button data-id="${it.id}" class="promote">Promote</button> <button data-id="${it.id}" class="clear">Clear</button></td>`;
        tbody.appendChild(tr);
      });
      document.querySelectorAll('.view').forEach(b => b.addEventListener('click', async (e) => {
        const id = e.target.dataset.id;
        try {
          const r = await fetch('/api/holds/' + encodeURIComponent(id));
          const text = await r.text();
          if (!text) {
            document.getElementById('preview').textContent = 'Error: Empty response body';
            return;
          }
          let json;
          try {
            json = JSON.parse(text);
          } catch (err) {
            document.getElementById('preview').textContent = 'Error: Invalid JSON response\n' + text;
            return;
          }
          document.getElementById('preview').textContent = JSON.stringify(json, null, 2);
        } catch (err) {
          document.getElementById('preview').textContent = 'Network error: ' + String(err);
        }
      }));
      document.querySelectorAll('.promote').forEach(b => b.addEventListener('click', async (e) => {
        const id = e.target.dataset.id;
        const r = await fetch('/api/holds/' + encodeURIComponent(id) + '/promote', { method: 'POST' });
        const text = await r.text();
        alert(text);
        fetchHolds();
      }));
      document.querySelectorAll('.clear').forEach(b => b.addEventListener('click', async (e) => {
        const id = e.target.dataset.id;
        if (!confirm('Clear hold ' + id + '? This will permanently delete the held file.')) return;
        const r = await fetch('/api/holds/' + encodeURIComponent(id) + '/clear', { method: 'POST' });
        const text = await r.text();
        alert(text);
        fetchHolds();
      }));
    }
    document.getElementById('refresh').addEventListener('click', fetchHolds);
    fetchHolds();
    // no auto-load of telemetry
  </script>
</body>
</html>
